name: SavingPrivateRahya
version: '1.0-SNAPSHOT'
main: com.zezdathecrystaldragon.savingPrivateRahya.SavingPrivateRahya
api-version: '1.21'
commands:
  svp:
    description: Starts or cancells the game.
    usage: /svp [start|cancell]
  setvip:
    description: Marks the specified player as the VIP.
    usage: /setvip [player]
  choosespawn:
    description: Decide where to spawn, either in the nether with VIP, or in the overworld
    usage: /choosespawn [nether|overworld]
  testsiege:
    description: spawns a mob to test siege ai
    usage: /testsiege